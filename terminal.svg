<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    @keyframes blink { 50% { opacity: 0; } }
  </style>
  <clipPath id="roundedClip">
    <rect width="400" height="400" rx="20" ry="20"/>
  </clipPath>
</defs>

<g clip-path="url(#roundedClip)">
  <rect width="400" height="400" fill="#000000"/>
  
  <rect width="400" height="36" fill="#111111"/>
  <rect y="26" width="400" height="10" fill="#111111"/>
  <rect x="1" y="36" width="398" height="1" fill="#222222"/>
  
  <circle cx="18" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="38" cy="18" r="6" fill="#febc2e"/>
  <circle cx="58" cy="18" r="6" fill="#28c840"/>
  
  <text x="200" y="23" font-family="monospace" font-size="12" fill="#8b949e" text-anchor="middle">bash — 400x400</text>

  <text x="20" y="70" font-family="monospace" font-size="14" fill="#3fb950" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.01s" begin="0.4s" fill="freeze"/>$</text>
  <g font-family="monospace" font-size="14" fill="#c9d1d9">
    <text x="34.0" y="70" opacity="0"><animate attributeName="opacity" values="0;1" dur="0.01s" begin="0.40s" fill="freeze"/>w</text>
    <text x="42.4" y="70" opacity="0"><animate attributeName="opacity" values="0;1" dur="0.01s" begin="0.47s" fill="freeze"/>h</text>
    <text x="50.8" y="70" opacity="0"><animate attributeName="opacity" values="0;1" dur="0.01s" begin="0.54s" fill="freeze"/>o</text>
    <text x="59.2" y="70" opacity="0"><animate attributeName="opacity" values="0;1" dur="0.01s" begin="0.61s" fill="freeze"/>a</text>
    <text x="67.6" y="70" opacity="0"><animate attributeName="opacity" values="0;1" dur="0.01s" begin="0.68s" fill="freeze"/>m</text>
    <text x="76.0" y="70" opacity="0"><animate attributeName="opacity" values="0;1" dur="0.01s" begin="0.75s" fill="freeze"/>i</text>
  </g>

  <g font-family="monospace" font-size="14" fill="#58a6ff">
    <text x="20" y="95" opacity="0"><animate attributeName="opacity" values="0;1" dur="0.01s" begin="1.2s" fill="freeze"/>&gt; Hello World</text>
  </g>

  <text x="20" y="140" font-family="monospace" font-size="14" fill="#3fb950" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.01s" begin="2.0s" fill="freeze"/>$</text>
  <g font-family="monospace" font-size="14" fill="#c9d1d9">
    <text x="34.0" y="140" opacity="0"><animate attributeName="opacity" values="0;1" dur="0.01s" begin="2.0s" fill="freeze"/>n</text>
    <text x="42.4" y="140" opacity="0"><animate attributeName="opacity" values="0;1" dur="0.01s" begin="2.1s" fill="freeze"/>o</text>
    <text x="50.8" y="140" opacity="0"><animate attributeName="opacity" values="0;1" dur="0.01s" begin="2.2s" fill="freeze"/>w</text>
  </g>

  <g font-family="monospace" font-size="14" fill="#58a6ff">
    <text x="20" y="170" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.01s" begin="2.8s" fill="freeze"/>&gt; If it works, it's engineering.</text>
    <text x="20" y="195" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.01s" begin="4.0s" fill="freeze"/>&gt; If it doesn't, it's research.</text>
  </g>

  <rect x="20" y="210" width="8" height="14" fill="#c9d1d9" opacity="0" rx="1">
    <animate attributeName="opacity" values="0;1" dur="0.01s" begin="5.0s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0;1" dur="1s" begin="5.0s" repeatCount="indefinite"/>
  </rect>

  <rect x="0.75" y="0.75" width="398.5" height="398.5" rx="20" ry="20" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
</g>
</svg>
