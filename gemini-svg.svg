<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="660" height="400" viewBox="0 0 660 400">
  <defs>
    <style>
      <![CDATA[
      /* Twinkling Stars */
      @keyframes blink { 0%, 100% { opacity: 1 } 50% { opacity: 0 } }
      .cursor { animation: blink 1s step-end infinite }
      @keyframes t0 { 0%, 100% { opacity: 0.2 } 50% { opacity: 0.9 } }
      @keyframes t1 { 0%, 100% { opacity: 0.3 } 50% { opacity: 0.8 } }
      @keyframes t2 { 0%, 100% { opacity: 0.15 } 50% { opacity: 0.95 } }
      
      /* GAME LOOP TIMELINE (40s Cycle) */
      @keyframes heroMove {
        0%, 6%    { transform: translate(80px, 306px); }   /* Start */
        10%, 14%  { transform: translate(100px, 250px); }  /* Bug 1 (Up) */
        18%, 22%  { transform: translate(230px, 180px); }  /* Bug 2 (Up) */
        26%, 30%  { transform: translate(370px, 220px); }  /* Bug 3 (Down) */
        34%, 38%  { transform: translate(470px, 280px); }  /* Bug 4 (Down) */
        42%, 48%  { transform: translate(300px, 120px); }  /* Bug 5 (Up) */
        60%, 100% { transform: translate(80px, 306px); }   /* Return */
      }
      
      /* DYNAMIC THRUSTER: Scales with vertical movement */
      @keyframes jetpack {
        0%, 6%   { transform: scaleY(0.5); opacity: 0.4; } /* Idle */
        10%, 14% { transform: scaleY(1.4); opacity: 0.9; } /* Climbing */
        18%, 22% { transform: scaleY(1.7); opacity: 1.0; } /* Steep Climbing */
        26%, 30% { transform: scaleY(0.7); opacity: 0.5; } /* Descending */
        34%, 38% { transform: scaleY(0.6); opacity: 0.4; } /* Descending */
        42%, 48% { transform: scaleY(2.2); opacity: 1.0; } /* MAX THRUST CLIMB */
        60%, 100%{ transform: scaleY(0.4); opacity: 0.3; } /* Return home */
      }

      @keyframes fireFlicker {
        0%, 100% { filter: brightness(1); transform: skewX(0deg); }
        50%      { filter: brightness(1.3); transform: skewX(1deg); }
      }
      
      /* Updated Flip: Stays facing right until all bugs (including 5th) are handled */
      @keyframes heroFlip {
        0%, 52%   { transform: scaleX(1); }
        53%, 95%  { transform: scaleX(-1); }
        96%, 100% { transform: scaleX(1); }
      }
      
      @keyframes heroBob {
        0%, 100%  { transform: translateY(0px); }
        50%       { transform: translateY(-5px); }
      }

      /* BULLET ANIMATION: Moving dashes to look like bullets */
      @keyframes bulletMove {
        0% { stroke-dashoffset: 0; }
        100% { stroke-dashoffset: -30; }
      }

      /* Bullet visibility synced to attacks */
      @keyframes laserShoot {
        0%, 10%, 13%, 18%, 21%, 26%, 29%, 34%, 37%, 42%, 47%, 100% { opacity: 0; }
        11%, 12%, 19%, 20%, 27%, 28%, 35%, 36%, 43%, 46% { opacity: 1; }
      }

      @keyframes tipPopup {
        0%, 2%    { opacity: 0; transform: translateY(10px); }
        3%, 90%   { opacity: 1; transform: translateY(0px); }
        95%, 100% { opacity: 0; transform: translateY(10px); }
      }

      @keyframes b1 { 0%, 10% { opacity: 1; } 11%, 95% { opacity: 0; } 96%, 100% { opacity: 1; } }
      @keyframes b2 { 0%, 18% { opacity: 1; } 19%, 95% { opacity: 0; } 96%, 100% { opacity: 1; } }
      @keyframes b3 { 0%, 26% { opacity: 1; } 27%, 95% { opacity: 0; } 96%, 100% { opacity: 1; } }
      @keyframes b4 { 0%, 34% { opacity: 1; } 35%, 95% { opacity: 0; } 96%, 100% { opacity: 1; } }
      @keyframes b5 { 0%, 42% { opacity: 1; } 43%, 95% { opacity: 0; } 96%, 100% { opacity: 1; } }
      
      @keyframes bugBob {
        0%, 100% { transform: translateY(0px); }
        50%      { transform: translateY(4px); }
      }

      @keyframes x1 { 0%, 10% { opacity: 0; transform: scale(0.5); } 11% { opacity: 1; transform: scale(1.5); } 14%, 100% { opacity: 0; transform: scale(3); } }
      @keyframes x2 { 0%, 18% { opacity: 0; transform: scale(0.5); } 19% { opacity: 1; transform: scale(1.5); } 22%, 100% { opacity: 0; transform: scale(3); } }
      @keyframes x3 { 0%, 26% { opacity: 0; transform: scale(0.5); } 27% { opacity: 1; transform: scale(1.5); } 30%, 100% { opacity: 0; transform: scale(3); } }
      @keyframes x4 { 0%, 34% { opacity: 0; transform: scale(0.5); } 35% { opacity: 1; transform: scale(1.5); } 38%, 100% { opacity: 0; transform: scale(3); } }
      @keyframes x5 { 0%, 42% { opacity: 0; transform: scale(0.5); } 43% { opacity: 1; transform: scale(1.5); } 46%, 100% { opacity: 0; transform: scale(3); } }

      @keyframes s0 { 0%, 10% { opacity: 1; } 11%, 100% { opacity: 0; } }
      @keyframes s1 { 0%, 10% { opacity: 0; } 11%, 18% { opacity: 1; } 19%, 100% { opacity: 0; } }
      @keyframes s2 { 0%, 18% { opacity: 0; } 19%, 26% { opacity: 1; } 27%, 100% { opacity: 0; } }
      @keyframes s3 { 0%, 26% { opacity: 0; } 27%, 34% { opacity: 1; } 35%, 100% { opacity: 0; } }
      @keyframes s4 { 0%, 34% { opacity: 0; } 35%, 42% { opacity: 1; } 43%, 100% { opacity: 0; } }
      @keyframes s5 { 0%, 42% { opacity: 0; } 43%, 95% { opacity: 1; } 96%, 100% { opacity: 0; } }

      @keyframes log1 { 0%, 3% { opacity: 0; } 4%, 100% { opacity: 0.35; } }
      @keyframes log2 { 0%, 18% { opacity: 0; } 19%, 100% { opacity: 0.35; } }
      @keyframes log3 { 0%, 34% { opacity: 0; } 35%, 100% { opacity: 0.35; } }
      @keyframes log4 { 0%, 45% { opacity: 0; } 46%, 100% { opacity: 0.35; } }

      .a-hero-move { animation: heroMove 40s infinite ease-in-out; }
      .a-hero-flip { animation: heroFlip 40s infinite step-end; transform-origin: 0px 0px; }
      .a-hero-bob  { animation: heroBob 1.5s infinite ease-in-out; }
      .a-bullets   { animation: laserShoot 40s infinite linear; }
      .a-bullet-stream { animation: bulletMove 0.3s infinite linear; }
      .a-jet       { animation: jetpack 40s infinite ease-in-out; transform-origin: top center;}
      .a-flicker   { animation: fireFlicker 0.1s infinite alternate; }
      .a-bob       { animation: bugBob 2.5s infinite ease-in-out; }
      .a-tip       { animation: tipPopup 40s infinite ease-out; }
      ]]>
    </style>
    <clipPath id="mainClip"><rect x="0" y="28" width="660" height="372"/></clipPath>
    <clipPath id="logClip"><rect x="12" y="76" width="300" height="55"/></clipPath>
    <clipPath id="roundedClip"><rect x="0" y="0" width="660" height="400" rx="10" ry="10"/></clipPath>
    <radialGradient id="plasmaGrad" cx="50%" cy="0%" r="100%">
      <stop offset="0%" stop-color="#fff" />
      <stop offset="20%" stop-color="#00ffff" />
      <stop offset="100%" stop-color="transparent" />
    </radialGradient>
  </defs>

  <g clip-path="url(#roundedClip)">
    <rect x="0" y="0" width="660" height="400" fill="#0a0a0a"/>
    <rect x="0" y="0" width="660" height="28" fill="#1c1c1c"/>
    <rect x="0" y="14" width="660" height="14" fill="#1c1c1c"/>
    <circle cx="20" cy="14" r="6" fill="#ff5f57"/>
    <circle cx="36" cy="14" r="6" fill="#ffbd2e"/>
    <circle cx="52" cy="14" r="6" fill="#28c840"/>
    <text x="330" y="18" text-anchor="middle" font-family="monospace" font-size="11" fill="#555">bash — ~/dev/github-patch-runner</text>

    <rect x="0" y="28" width="660" height="372" fill="#0a0a0a"/>
    <rect x="50" y="108" width="2" height="2" fill="#1e3a1e" style="animation:t0 2.1s infinite"/>
    <rect x="140" y="80" width="2" height="2" fill="#1e3a1e" style="animation:t1 1.8s infinite"/>
    <rect x="250" y="130" width="2" height="2" fill="#1e3a1e" style="animation:t2 2.5s infinite"/>
    <rect x="310" y="250" width="2" height="2" fill="#1e3a1e" style="animation:t0 1.6s infinite"/>
    <rect x="440" y="93" width="2" height="2" fill="#1e3a1e" style="animation:t1 2.2s infinite"/>
    <rect x="550" y="160" width="2" height="2" fill="#1e3a1e" style="animation:t2 1.9s infinite"/>
    <rect x="80" y="280" width="2" height="2" fill="#1e3a1e" style="animation:t0 2.7s infinite"/>
    <rect x="380" y="290" width="2" height="2" fill="#1e3a1e" style="animation:t1 1.7s infinite"/>

    <rect x="0" y="28" width="660" height="48" fill="#0a0a0a"/>
    <line x1="0" y1="76" x2="660" y2="76" stroke="#1a2a1a" stroke-width="1"/>
    <text x="12" y="44" font-family="monospace" font-size="10" fill="#28c840">HP: [########] 100%</text>
    
    <text x="12" y="58" font-family="monospace" font-size="10" fill="#e67e22" style="animation: s0 40s infinite">BUGS KILLED: 0   SCORE: 0    LVL: INF</text>
    <text x="12" y="58" font-family="monospace" font-size="10" fill="#e67e22" style="animation: s1 40s infinite">BUGS KILLED: 1   SCORE: 100  LVL: INF</text>
    <text x="12" y="58" font-family="monospace" font-size="10" fill="#e67e22" style="animation: s2 40s infinite">BUGS KILLED: 2   SCORE: 250  LVL: INF</text>
    <text x="12" y="58" font-family="monospace" font-size="10" fill="#e67e22" style="animation: s3 40s infinite">BUGS KILLED: 3   SCORE: 350  LVL: INF</text>
    <text x="12" y="58" font-family="monospace" font-size="10" fill="#e67e22" style="animation: s4 40s infinite">BUGS KILLED: 4   SCORE: 500  LVL: INF</text>
    <text x="12" y="58" font-family="monospace" font-size="10" fill="#e67e22" style="animation: s5 40s infinite">BUGS KILLED: 5   SCORE: 650  LVL: INF</text>

    <g transform="translate(606,73)">
      <rect x="13" y="14.5" width="18" height="17" fill="#c9d1d9"/>
      <rect x="13" y="8" width="4" height="5" fill="#c9d1d9"/>
      <rect x="27" y="8" width="4" height="5" fill="#c9d1d9"/>
      <rect x="16.7" y="20" width="3.6" height="4" fill="#1a1a1a"/>
      <rect x="23.7" y="20" width="3.6" height="4" fill="#1a1a1a"/>
      <rect x="8" y="24" width="5" height="1" fill="#c9d1d9"/>
      <rect x="8" y="26" width="5" height="1" fill="#c9d1d9"/>
      <rect x="8" y="28" width="5" height="1" fill="#c9d1d9"/>
      <rect x="31" y="24" width="5" height="1" fill="#c9d1d9"/>
      <rect x="31" y="26" width="5" height="1" fill="#c9d1d9"/>
      <rect x="31" y="28" width="5" height="1" fill="#c9d1d9"/>
      <text x="22" y="45" text-anchor="middle" font-family="monospace" font-size="8" fill="#58a6ff">GitHub</text>
    </g>

    <g transform="translate(380, 83)">
       <g class="a-tip">
          <rect x="-10" y="0" width="230" height="78" rx="4" fill="#0d1117" stroke="#f34f29" stroke-width="2"/>
          <text x="15" y="24" font-family="monospace" font-size="9" fill="#f34f29" font-weight="bold">GitHub Security Alert: Build Failures </text>
          <text x="15" y="38" font-family="monospace" font-size="8" fill="#7ec8e3">System integrity failing. Manual fix needed.</text>
          <text x="15" y="52" font-family="monospace" font-size="8" fill="#2ecc71">&gt; Initiate("./catch_me.sh --kill-all") </text>
       </g>
    </g>

    <g clip-path="url(#logClip)">
      <text x="12" y="88" font-family="monospace" font-size="9" fill="#58a6ff" opacity="0" style="animation: log1 40s infinite">[GIT ] Patch received. UFO launched.</text>
      <text x="12" y="101" font-family="monospace" font-size="9" fill="#2ecc71" opacity="0" style="animation: log2 40s infinite">[KILL] NullPtr and Syntax destroyed!</text>
      <text x="12" y="114" font-family="monospace" font-size="9" fill="#2ecc71" opacity="0" style="animation: log3 40s infinite">[KILL] InfLoop and MemLeak destroyed!</text>
      <text x="12" y="127" font-family="monospace" font-size="9" fill="#e67e22" opacity="0" style="animation: log4 40s infinite">[CLEAR] Sector secured. Returning to base.</text>
    </g>

   

    <g clip-path="url(#mainClip)">
      <g transform="translate(150, 250)">
        <g style="animation: b1 40s infinite linear"><g class="a-bob"><rect x="-14" y="-18" width="28" height="24" fill="#27ae60"/><rect x="-8" y="-12" width="6" height="6" fill="#000"/><rect x="2" y="-12" width="6" height="6" fill="#000"/><rect x="-6" y="-10" width="2" height="2" fill="#ff0040"/><rect x="4" y="-10" width="2" height="2" fill="#ff0040"/><rect x="-8" y="-2" width="4" height="4" fill="#fff"/><rect x="4" y="-2" width="4" height="4" fill="#fff"/><text x="0" y="-24" text-anchor="middle" font-family="monospace" font-size="8" fill="#2ecc71">NullPtr</text></g></g>
      </g>
      <g transform="translate(150, 250)"><g style="animation: x1 40s infinite ease-out; transform-origin: 0px 0px;"><rect x="-12" y="-12" width="8" height="8" fill="#27ae60"/><rect x="4" y="-4" width="8" height="8" fill="#ff0040"/><rect x="-8" y="4" width="8" height="8" fill="#27ae60"/></g></g>

      <g transform="translate(280, 180)">
        <g style="animation: b2 40s infinite linear"><g class="a-bob"><rect x="-12" y="-26" width="4" height="8" fill="#c0392b"/><rect x="8" y="-26" width="4" height="8" fill="#c0392b"/><rect x="-14" y="-18" width="28" height="24" fill="#c0392b"/><rect x="-10" y="-12" width="20" height="6" fill="#000"/><rect x="-4" y="-10" width="8" height="2" fill="#ffcc00"/><text x="0" y="-30" text-anchor="middle" font-family="monospace" font-size="8" fill="#e74c3c">Syntax</text></g></g>
      </g>
      <g transform="translate(280, 180)"><g style="animation: x2 40s infinite ease-out; transform-origin: 0px 0px;"><rect x="-12" y="-12" width="8" height="8" fill="#c0392b"/><rect x="4" y="-4" width="8" height="8" fill="#ffcc00"/><rect x="-8" y="4" width="8" height="8" fill="#c0392b"/></g></g>

      <g transform="translate(420, 220)">
        <g style="animation: b3 40s infinite linear"><g class="a-bob"><rect x="-18" y="-16" width="36" height="20" fill="#8e44ad"/><rect x="-14" y="-12" width="6" height="6" fill="#000"/><rect x="-12" y="-10" width="2" height="2" fill="#00ffcc"/><rect x="-3" y="-12" width="6" height="6" fill="#000"/><rect x="-1" y="-10" width="2" height="2" fill="#00ffcc"/><rect x="8" y="-12" width="6" height="6" fill="#000"/><rect x="10" y="-10" width="2" height="2" fill="#00ffcc"/><rect x="-14" y="4" width="4" height="4" fill="#8e44ad"/><rect x="10" y="4" width="4" height="4" fill="#8e44ad"/><text x="0" y="-22" text-anchor="middle" font-family="monospace" font-size="8" fill="#9b59b6">InfLoop</text></g></g>
      </g>
      <g transform="translate(420, 220)"><g style="animation: x3 40s infinite ease-out; transform-origin: 0px 0px;"><rect x="-12" y="-12" width="8" height="8" fill="#8e44ad"/><rect x="4" y="-4" width="8" height="8" fill="#00ffcc"/><rect x="-8" y="4" width="8" height="8" fill="#8e44ad"/></g></g>

      <g transform="translate(520, 280)">
        <g style="animation: b4 40s infinite linear"><g class="a-bob"><rect x="-14" y="-20" width="28" height="20" fill="#d35400"/><rect x="-8" y="-14" width="4" height="4" fill="#000"/><rect x="4" y="-14" width="4" height="4" fill="#000"/><rect x="-10" y="0" width="6" height="8" fill="#d35400"/><rect x="4" y="0" width="6" height="12" fill="#d35400"/><rect x="6" y="14" width="2" height="2" fill="#d35400"/><text x="0" y="-26" text-anchor="middle" font-family="monospace" font-size="8" fill="#e67e22">MemLeak</text></g></g>
      </g>
      <g transform="translate(520, 280)"><g style="animation: x4 40s infinite ease-out; transform-origin: 0px 0px;"><rect x="-12" y="-12" width="8" height="8" fill="#d35400"/><rect x="4" y="-4" width="8" height="8" fill="#fff"/><rect x="-8" y="4" width="8" height="8" fill="#d35400"/></g></g>

      <g transform="translate(350, 120)">
        <g style="animation: b5 40s infinite linear"><g class="a-bob"><rect x="-18" y="-14" width="32" height="16" fill="#2980b9"/><rect x="-24" y="-6" width="6" height="8" fill="#2980b9"/><rect x="4" y="-10" width="6" height="6" fill="#000"/><rect x="6" y="-8" width="2" height="2" fill="#ff66bb"/><rect x="-14" y="2" width="8" height="6" fill="#111"/><rect x="4" y="2" width="8" height="6" fill="#111"/><text x="0" y="-20" text-anchor="middle" font-family="monospace" font-size="8" fill="#3498db">RaceCond</text></g></g>
      </g>
      <g transform="translate(350, 120)"><g style="animation: x5 40s infinite ease-out; transform-origin: 0px 0px;"><rect x="-12" y="-12" width="8" height="8" fill="#2980b9"/><rect x="4" y="-4" width="8" height="8" fill="#ff66bb"/><rect x="-8" y="4" width="8" height="8" fill="#2980b9"/></g></g>

      <g class="a-hero-move">
        <g class="a-hero-flip">
          <g class="a-hero-bob">
            <g class="a-jet">
              <g class="a-flicker">
                <path d="M-8,8 L8,8 L0,45 Z" fill="url(#plasmaGrad)" opacity="0.8"/>
                <path d="M-4,8 L4,8 L0,25 Z" fill="#fff" opacity="0.9"/>
              </g>
            </g>

            <path d="M-16,-12 L16,-12 L10,-24 L-10,-24 Z" fill="#e0f7fa"/>
            <rect x="-6" y="-20" width="4" height="4" fill="#fff"/> 
            <rect x="-24" y="-12" width="48" height="12" fill="#95a5a6"/>
            <rect x="-28" y="-8" width="56" height="4" fill="#7f8c8d"/>

            <rect x="-18" y="-6" width="4" height="4" fill="#e74c3c"/>
            <rect x="-2" y="-6" width="4" height="4" fill="#2ecc71"/>
            <rect x="14" y="-6" width="4" height="4" fill="#3498db"/>

