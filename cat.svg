<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 100 100" shape-rendering="crispedges">
  <style>
    <![CDATA[
    @keyframes minimalReveal {
      0% { 
        opacity: 0; 
        transform: translateY(8px) scale(0.95); 
      }
      100% { 
        opacity: 1; 
        transform: translateY(0) scale(1); 
      }
    }
    
    .pixel-cat {
      transform-origin: 50% 50%;
      /* 0.6 seconds duration, ease-out for a smooth finish, plays once */
      animation: minimalReveal 0.6s ease-out forwards;
    }
    ]]>
  </style>

  <g class="pixel-cat">
    <rect x="30" y="30" width="40" height="40" fill="#c9d1d9" />
    
    <rect x="30" y="10" width="12" height="15" fill="#c9d1d9" />
    <rect x="58" y="10" width="12" height="15" fill="#c9d1d9" />
    
    <rect x="36" y="44" width="10" height="10" fill="#161b22" />
    <rect x="54" y="44" width="10" height="10" fill="#161b22" />
    
    <rect x="14" y="50" width="16" height="3" fill="#c9d1d9" />
    <rect x="14" y="56" width="16" height="3" fill="#c9d1d9" />
    <rect x="14" y="62" width="16" height="3" fill="#c9d1d9" />
    
    <rect x="70" y="50" width="16" height="3" fill="#c9d1d9" />
    <rect x="70" y="56" width="16" height="3" fill="#c9d1d9" />
    <rect x="70" y="62" width="16" height="3" fill="#c9d1d9" />
  </g>
</svg>
