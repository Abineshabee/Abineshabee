<svg xmlns="http://www.w3.org/2000/svg" width="144" height="120" viewBox="0 0 72 60" shape-rendering="crispedges">
  <style>
    <![CDATA[
    /* 3-Second Synchronized Loop Timeline */
    
    @keyframes loopHead {
      0% { opacity: 0; transform: scale(0.5); }
      8% { opacity: 1; transform: scale(1.05); }
      12%, 80% { opacity: 1; transform: scale(1); }
      90%, 100% { opacity: 0; transform: scale(0.5); }
    }

    @keyframes loopEars {
      0%, 5% { opacity: 0; transform: scale(0.5); }
      11% { opacity: 1; transform: scale(1.05); }
      15%, 80% { opacity: 1; transform: scale(1); }
      90%, 100% { opacity: 0; transform: scale(0.5); }
    }

    @keyframes loopEyes {
      0%, 10% { opacity: 0; }
      11%, 80% { opacity: 1; }
      90%, 100% { opacity: 0; }
    }

    @keyframes loopWhiskersLeft {
      0%, 15% { opacity: 0; transform: translateX(10px); }
      20%, 80% { opacity: 1; transform: translateX(0); }
      90%, 100% { opacity: 0; transform: translateX(10px); }
    }

    @keyframes loopWhiskersRight {
      0%, 15% { opacity: 0; transform: translateX(-10px); }
      20%, 80% { opacity: 1; transform: translateX(0); }
      90%, 100% { opacity: 0; transform: translateX(-10px); }
    }

    /* Assigning the shared 3s infinite animations */
    .head-base {
      opacity: 0;
      transform-origin: 36px 40px; 
      animation: loopHead 3s infinite;
    }
    
    .ears {
      opacity: 0;
      transform-origin: 36px 40px;
      animation: loopEars 3s infinite;
    }

    .eyes {
      opacity: 0;
      animation: loopEyes 3s infinite;
    }

    .whiskers-left {
      opacity: 0;
      animation: loopWhiskersLeft 3s ease-out infinite;
    }

    .whiskers-right {
      opacity: 0;
      animation: loopWhiskersRight 3s ease-out infinite;
    }
    ]]>
  </style>

  <g class="ears">
    <rect x="16" y="0" width="12" height="15" fill="#c9d1d9" />
    <rect x="44" y="0" width="12" height="15" fill="#c9d1d9" />
  </g>

  <rect class="head-base" x="16" y="20" width="40" height="40" fill="#c9d1d9" />
  
  <g class="eyes">
    <rect x="22" y="34" width="10" height="10" fill="#161b22" />
    <rect x="40" y="34" width="10" height="10" fill="#161b22" />
  </g>
  
  <g class="whiskers-left">
    <rect x="0" y="40" width="16" height="3" fill="#c9d1d9" />
    <rect x="0" y="46" width="16" height="3" fill="#c9d1d9" />
    <rect x="0" y="52" width="16" height="3" fill="#c9d1d9" />
  </g>

  <g class="whiskers-right">
    <rect x="56" y="40" width="16" height="3" fill="#c9d1d9" />
    <rect x="56" y="46" width="16" height="3" fill="#c9d1d9" />
    <rect x="56" y="52" width="16" height="3" fill="#c9d1d9" />
  </g>
</svg>
